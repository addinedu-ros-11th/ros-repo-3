# waypoint_graph.yaml
# POI 간 경유지 그래프 (웨이포인트는 YAML 주 소스)
#
# 포맷:
#   pois:
#     <poi_id>:
#       name:    표시명
#       x, y:    map 좌표 (m)
#       yaw:     목표 방향 (라디안)
#       zone_id: 소속 구역 ID
#
#   edges:
#     - from: <poi_id>
#       to:   <poi_id>
#       via:            # 중간 경유 좌표 목록 (선택)
#         - [x, y]
#         - [x, y]
#
# 서버에서 POI/Zone 데이터를 받아올 수 없을 때는
# config/fallback/pois.yaml 과 config/fallback/zones.yaml 을 사용한다.
# 이 파일의 웨이포인트 그래프는 항상 로컬에서 참조한다.

pois:
  entrance:
    name: "입구"
    x: 0.0
    y: 0.0
    yaw: 0.0
    zone_id: zone_lobby

  cafe_a:
    name: "카페 A"
    x: 3.5
    y: 1.2
    yaw: 1.5708   # 90°
    zone_id: zone_f1

  cafe_b:
    name: "카페 B"
    x: 6.0
    y: 1.2
    yaw: 1.5708
    zone_id: zone_f1

  store_a:
    name: "매장 A"
    x: 3.5
    y: 5.0
    yaw: 3.1416   # 180°
    zone_id: zone_f1

  meetup_lobby:
    name: "meet-up 로비"
    x: 1.0
    y: 0.5
    yaw: 0.0
    zone_id: zone_lobby

  charging_dock:
    name: "충전 스테이션"
    x: -1.0
    y: -0.5
    yaw: 3.1416
    zone_id: zone_back

edges:
  - from: entrance
    to:   cafe_a

  - from: entrance
    to:   cafe_b
    via:
      - [2.0, 0.0]
      - [2.0, 1.2]

  - from: cafe_a
    to:   cafe_b

  - from: cafe_a
    to:   store_a

  - from: cafe_b
    to:   store_a

  - from: store_a
    to:   meetup_lobby
    via:
      - [3.5, 3.0]
      - [1.0, 3.0]

  - from: meetup_lobby
    to:   entrance

  - from: entrance
    to:   charging_dock
